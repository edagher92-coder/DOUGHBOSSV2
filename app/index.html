<!DOCTYPE html>
<html lang="en-AU">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
	<meta name="theme-color" content="#111111" />
	<title>DoughBoss Console</title>
	<meta name="robots" content="noindex" />
	<!-- PWA: installable (add-to-home-screen) via manifest + icons. No service worker by design. -->
	<link rel="manifest" href="./manifest.webmanifest" />
	<meta name="apple-mobile-web-app-capable" content="yes" />
	<meta name="apple-mobile-web-app-status-bar-style" content="black" />
	<meta name="apple-mobile-web-app-title" content="DoughBoss" />
	<link rel="apple-touch-icon" href="./icon-192.png" />
	<link rel="stylesheet" href="app.css" />
</head>
<body>
	<div id="app"><div class="db-boot">Loading…</div></div>
	<!-- html5-qrcode (Apache-2.0) — camera QR scanning for the Voucher Scan screen.
	     UMD build from jsDelivr; exposes window.Html5Qrcode. Degrades gracefully if it fails to load. -->
	<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
	<script src="app.js"></script>
</body>
</html>
