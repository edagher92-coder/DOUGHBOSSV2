<!DOCTYPE html>
<html lang="en-AU">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
	<meta name="theme-color" content="#0a0807" />
	<title>DoughBoss Console</title>
	<meta name="robots" content="noindex" />
	<!--
		SECURITY: "noindex" only asks search engines not to index this page — it is
		NOT access control. This is a static bundle with no server-side gate in
		front of it; the REST data behind the login is still protected by real
		WordPress capability checks, but this shell itself is publicly fetchable
		by anyone with the URL. Before sharing this console's URL with staff,
		configure hosting-level access control (Basic Auth / Cloudflare Access /
		equivalent) per docs/DoughBoss-Manual-Deployment.md §7 — this cannot be
		enforced from the WordPress plugin.
	-->
	<!-- PWA: installable (add-to-home-screen) via manifest + icons. No service worker by design. -->
	<link rel="manifest" href="./manifest.webmanifest" />
	<meta name="apple-mobile-web-app-capable" content="yes" />
	<meta name="apple-mobile-web-app-status-bar-style" content="black" />
	<meta name="apple-mobile-web-app-title" content="DoughBoss" />
	<link rel="apple-touch-icon" href="./icon-192.png" />
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&display=swap" />
	<link rel="stylesheet" href="app.css" />
</head>
<body>
	<div id="app"><div class="db-boot">Loading…</div></div>
	<!-- html5-qrcode (Apache-2.0) — camera QR scanning for the Voucher Scan screen.
	     UMD build from jsDelivr; exposes window.Html5Qrcode. Degrades gracefully if it fails to load. -->
	<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
	<script src="app.js"></script>
</body>
</html>
