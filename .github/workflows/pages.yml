name: Deploy demo to GitHub Pages

on:
  push:
    branches: [ "claude/doughboss-website-design-fixes-li6dqa" ]
    paths:
      - "demo/**"
      - "docs/DoughBoss-Staff-Management-Quick-Guide-2026-07-24.html"
      - "docs/DoughBoss-Staff-Management-Quick-Guide-2026-07-24.pdf"
      - "docs/walkthrough/DB-06-order-tracking.png"
      - "docs/walkthrough/DB-08-kitchen-ipad.png"
      - "docs/walkthrough/DB-10-dashboard.png"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Prepare public demo and noindex operations guide
        run: |
          mkdir -p _site/docs/walkthrough
          cp -R demo/. _site/
          cp docs/DoughBoss-Staff-Management-Quick-Guide-2026-07-24.html _site/docs/
          cp docs/DoughBoss-Staff-Management-Quick-Guide-2026-07-24.pdf _site/docs/
          cp docs/walkthrough/DB-06-order-tracking.png _site/docs/walkthrough/
          cp docs/walkthrough/DB-08-kitchen-ipad.png _site/docs/walkthrough/
          cp docs/walkthrough/DB-10-dashboard.png _site/docs/walkthrough/
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
